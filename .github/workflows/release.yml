name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build zip
        run: |
          PLUGIN_DIR="harvest_accessibility"
          ZIP_NAME="harvest_accessibility_v${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" "$PLUGIN_DIR" \
            --exclude "*/__pycache__/*" \
            --exclude "*/.DS_Store"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          body_path: CHANGELOG.md
